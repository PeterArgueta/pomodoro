<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #1a0a2e;
            --bg2:          #2d1b4e;
            --purple:       #7c3aed;
            --purple-light: #a855f7;
            --purple-mid:   #6d28d9;
            --accent:       #f0abfc;
            --white:        #ffffff;
            --card-bg:      rgba(255,255,255,0.07);
            --card-border:  rgba(255,255,255,0.13);
            --text:         #f3e8ff;
            --text-muted:   #c4b5fd;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(ellipse at 60% 0%, #3b0764 0%, #1a0a2e 60%, #0f0520 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.1; transform: scale(1); }
            to   { opacity: 0.9; transform: scale(1.3); }
        }

        .app-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 24px;
            gap: 18px;
        }

        .app-header { text-align: center; }
        .app-title {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(120deg, #f0abfc, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 12px rgba(192,132,252,0.5));
        }

        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 999px;
            padding: 6px 20px;
            font-family: 'Baloo 2', cursive;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            box-shadow: 0 2px 14px rgba(168,85,247,0.2);
        }
        .mode-badge.break-mode {
            color: #86efac;
            border-color: rgba(134,239,172,0.3);
            box-shadow: 0 2px 14px rgba(74,222,128,0.2);
        }

        .tomato-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .tomato-svg {
            width: clamp(220px, 55vw, 310px);
            height: auto;
            filter: drop-shadow(0 8px 32px rgba(231,76,60,0.45)) drop-shadow(0 0 60px rgba(231,76,60,0.15));
            transition: filter 0.5s ease;
        }
        .tomato-svg.running {
            filter: drop-shadow(0 8px 36px rgba(231,76,60,0.65)) drop-shadow(0 0 70px rgba(231,76,60,0.25));
            animation: tomatoPulse 2s ease-in-out infinite;
        }
        @keyframes tomatoPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.012); }
        }

        .time-display {
            font-family: 'Baloo 2', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 800;
            color: var(--white);
            text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 2px;
            margin-top: -8px;
            transition: color 0.4s;
        }
        .time-display.break-time {
            color: #86efac;
            text-shadow: 0 0 30px rgba(134,239,172,0.5), 0 2px 8px rgba(0,0,0,0.5);
        }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            font-family: 'Baloo 2', cursive;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 999px;
            padding: 12px 28px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
            border-radius: inherit;
        }
        .btn:hover:not(:disabled)::after { background: rgba(255,255,255,0.1); }
        .btn:active:not(:disabled)       { transform: scale(0.95); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-start {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            box-shadow: 0 4px 18px rgba(124,58,237,0.5);
        }
        .btn-start:hover:not(:disabled) {
            box-shadow: 0 6px 24px rgba(168,85,247,0.65);
            transform: translateY(-1px);
        }
        .btn-pause {
            background: linear-gradient(135deg, #5b21b6, #7c3aed);
            color: white;
            box-shadow: 0 4px 14px rgba(91,33,182,0.4);
        }
        .btn-pause:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(124,58,237,0.5);
            transform: translateY(-1px);
        }
        .btn-reset {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
        }
        .btn-reset:hover { background: rgba(255,255,255,0.12); color: var(--white); }

        .settings-card {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 18px 28px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .setting-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .setting-group label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .setting-group input[type="number"] {
            width: 76px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: var(--white);
            font-family: 'Baloo 2', cursive;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 6px 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }
        .setting-group input[type="number"]::-webkit-outer-spin-button,
        .setting-group input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .setting-group input[type="number"]:focus {
            border-color: var(--purple-light);
            box-shadow: 0 0 0 3px rgba(168,85,247,0.25);
        }

        .app-footer { font-size: 0.78rem; color: rgba(196,181,253,0.45); letter-spacing: 0.5px; }

        @keyframes finishFlash {
            0%   { filter: drop-shadow(0 8px 36px rgba(255,220,50,0.9)) drop-shadow(0 0 80px rgba(255,200,0,0.5)); }
            100% { filter: drop-shadow(0 8px 36px rgba(231,76,60,0.55)) drop-shadow(0 0 60px rgba(231,76,60,0.15)); }
        }
        .tomato-svg.finished { animation: finishFlash 0.4s ease-in-out 3; }

        @media (max-width: 400px) {
            .controls { gap: 8px; }
            .btn { padding: 10px 18px; font-size: 0.9rem; }
            .settings-card { padding: 14px 16px; }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="app-wrapper">
    <header class="app-header">
        <h1 class="app-title">🍅 Pomodoro</h1>
    </header>

    <div class="mode-badge" id="modeBadge">
        <span class="mode-icon" id="modeIcon">💼</span>
        <span id="modeLabel">Trabajo</span>
    </div>

    <div class="tomato-container">
        <svg id="tomatoSvg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" class="tomato-svg">
            <ellipse cx="160" cy="295" rx="75" ry="12" fill="rgba(0,0,0,0.18)" />
            <circle cx="160" cy="168" r="130" fill="url(#tomatoGrad)" />
            <ellipse cx="118" cy="108" rx="36" ry="24" fill="rgba(255,255,255,0.22)" transform="rotate(-20,118,108)" />
            <ellipse cx="108" cy="100" rx="14" ry="9" fill="rgba(255,255,255,0.35)" transform="rotate(-20,108,100)" />
            <g id="tickMarks"></g>
            <circle id="progressArc"
                cx="160" cy="168" r="118"
                fill="none"
                stroke="rgba(255,255,255,0.28)"
                stroke-width="6"
                stroke-linecap="round"
                stroke-dasharray="0 741"
                transform="rotate(-225 160 168)"
            />
            <g id="needleGroup" transform="rotate(0 160 168)">
                <rect x="157" y="60" width="6" height="72" rx="3" fill="white" filter="url(#needleShadow)" />
                <circle cx="160" cy="168" r="8" fill="white" />
                <circle cx="160" cy="168" r="4" fill="#c0392b" />
            </g>
            <g id="leaves">
                <rect x="157" y="22" width="6" height="26" rx="3" fill="#27ae60" />
                <ellipse cx="138" cy="36" rx="20" ry="9" fill="#2ecc71" transform="rotate(-30 138 36)" />
                <ellipse cx="138" cy="36" rx="20" ry="9" fill="none" stroke="#27ae60" stroke-width="1.5" transform="rotate(-30 138 36)" />
                <ellipse cx="182" cy="36" rx="20" ry="9" fill="#2ecc71" transform="rotate(30 182 36)" />
                <ellipse cx="182" cy="36" rx="20" ry="9" fill="none" stroke="#27ae60" stroke-width="1.5" transform="rotate(30 182 36)" />
                <ellipse cx="152" cy="30" rx="12" ry="6" fill="#58d68d" transform="rotate(-50 152 30)" />
                <ellipse cx="170" cy="30" rx="12" ry="6" fill="#58d68d" transform="rotate(50 170 30)" />
            </g>
            <g id="kawaiiFace">
                <ellipse cx="138" cy="160" rx="10" ry="11" fill="#2c2c2c" />
                <ellipse cx="182" cy="160" rx="10" ry="11" fill="#2c2c2c" />
                <ellipse cx="135" cy="157" rx="3.5" ry="4" fill="white" />
                <ellipse cx="179" cy="157" rx="3.5" ry="4" fill="white" />
                <path id="mouthPath" d="M 143 182 Q 160 198 177 182" stroke="#2c2c2c" stroke-width="3.5" fill="none" stroke-linecap="round" />
                <ellipse cx="122" cy="175" rx="12" ry="7" fill="rgba(255,150,130,0.45)" />
                <ellipse cx="198" cy="175" rx="12" ry="7" fill="rgba(255,150,130,0.45)" />
            </g>
            <defs>
                <radialGradient id="tomatoGrad" cx="40%" cy="35%" r="65%">
                    <stop offset="0%"   stop-color="#ff6b6b" />
                    <stop offset="45%"  stop-color="#e74c3c" />
                    <stop offset="100%" stop-color="#a93226" />
                </radialGradient>
                <filter id="needleShadow">
                    <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.4)" />
                </filter>
            </defs>
        </svg>
        <div class="time-display" id="timeDisplay">25:00</div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="btnStart" onclick="pomodoroStart()">&#9654; Iniciar</button>
        <button class="btn btn-pause" id="btnPause" onclick="pomodoroPause()" disabled>&#9646;&#9646; Pausar</button>
        <button class="btn btn-reset" onclick="pomodoroReset()">&#8635; Reset</button>
    </div>

    <div class="settings-card">
        <div class="setting-group">
            <label for="workMinutes">&#128188; Trabajo (min)</label>
            <input type="number" id="workMinutes" min="1" max="60" value="25" onchange="onSettingChange()" />
        </div>
        <div class="setting-group">
            <label for="breakMinutes">&#9749; Descanso (min)</label>
            <input type="number" id="breakMinutes" min="1" max="30" value="5" onchange="onSettingChange()" />
        </div>
    </div>

    <footer class="app-footer">Peter Argueta</footer>
</div>

<script>
    let totalSeconds  = 25 * 60;
    let remainSeconds = totalSeconds;
    let isRunning     = false;
    let isWork        = true;
    let intervalId    = null;

    const timeDisplay = document.getElementById('timeDisplay');
    const modeBadge   = document.getElementById('modeBadge');
    const modeLabel   = document.getElementById('modeLabel');
    const modeIcon    = document.getElementById('modeIcon');
    const needleGroup = document.getElementById('needleGroup');
    const progressArc = document.getElementById('progressArc');
    const tomatoSvg   = document.getElementById('tomatoSvg');
    const mouthPath   = document.getElementById('mouthPath');
    const btnStart    = document.getElementById('btnStart');
    const btnPause    = document.getElementById('btnPause');

    const SVG_CX = 160, SVG_CY = 168, SVG_R = 118;
    const ARC_DEG = 270;
    const FULL_CIRCUMFERENCE = 2 * Math.PI * SVG_R;

    document.addEventListener('DOMContentLoaded', () => {
        buildStars();
        buildTickMarks();
        updateDisplay();
        updateNeedle();
    });

    function buildStars() {
        const container = document.getElementById('stars');
        for (let i = 0; i < 90; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;opacity:${(Math.random()*0.5+0.1).toFixed(2)};`;
            container.appendChild(s);
        }
    }

    function buildTickMarks() {
        const g = document.getElementById('tickMarks');
        while (g.firstChild) g.removeChild(g.firstChild);
        const TICKS = 60;
        const R_OUTER = 130;
        const startAngle = -225;
        for (let i = 0; i <= TICKS; i++) {
            const frac    = i / TICKS;
            const deg     = startAngle + frac * ARC_DEG;
            const rad     = deg * Math.PI / 180;
            const isMajor = (i % 5 === 0);
            const tickLen = isMajor ? 16 : 8;
            const x1 = SVG_CX + R_OUTER * Math.cos(rad);
            const y1 = SVG_CY + R_OUTER * Math.sin(rad);
            const x2 = SVG_CX + (R_OUTER - tickLen) * Math.cos(rad);
            const y2 = SVG_CY + (R_OUTER - tickLen) * Math.sin(rad);
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1.toFixed(2));
            line.setAttribute('y1', y1.toFixed(2));
            line.setAttribute('x2', x2.toFixed(2));
            line.setAttribute('y2', y2.toFixed(2));
            line.setAttribute('stroke', 'rgba(255,255,255,0.65)');
            line.setAttribute('stroke-width', isMajor ? '2.5' : '1.2');
            line.setAttribute('stroke-linecap', 'round');
            g.appendChild(line);
        }
    }

    function formatTime(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return m + ':' + s;
    }

    function updateDisplay() { timeDisplay.textContent = formatTime(remainSeconds); }

    function updateNeedle() {
        const fraction = remainSeconds / totalSeconds;
        const deg = -225 + fraction * ARC_DEG;
        needleGroup.setAttribute('transform', 'rotate(' + deg.toFixed(2) + ' ' + SVG_CX + ' ' + SVG_CY + ')');
        const arcLen = fraction * (ARC_DEG / 360) * FULL_CIRCUMFERENCE;
        progressArc.setAttribute('stroke-dasharray', arcLen.toFixed(2) + ' ' + FULL_CIRCUMFERENCE.toFixed(2));
    }

    function updateKawaiiMood() {
        if (isWork) {
            mouthPath.setAttribute('d', 'M 143 182 Q 160 198 177 182');
            modeLabel.textContent = 'Trabajo';
            modeIcon.textContent  = String.fromCodePoint(0x1F4BC);
            modeBadge.classList.remove('break-mode');
            timeDisplay.classList.remove('break-time');
        } else {
            mouthPath.setAttribute('d', 'M 143 188 Q 160 198 177 188');
            modeLabel.textContent = 'Descanso';
            modeIcon.textContent  = String.fromCodePoint(0x2615);
            modeBadge.classList.add('break-mode');
            timeDisplay.classList.add('break-time');
        }
    }

    function playBeep() {
        try {
            const ctx  = new (window.AudioContext || window.webkitAudioContext)();
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
            osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.8);
            const osc2 = ctx.createOscillator();
            const g2   = ctx.createGain();
            osc2.connect(g2); g2.connect(ctx.destination);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1100, ctx.currentTime + 0.3);
            g2.gain.setValueAtTime(0.4, ctx.currentTime + 0.3);
            g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
            osc2.start(ctx.currentTime + 0.3); osc2.stop(ctx.currentTime + 1.0);
        } catch(e) {}
    }

    function tick() {
        if (remainSeconds <= 0) { cycleEnd(); return; }
        remainSeconds--;
        updateDisplay();
        updateNeedle();
    }

    function cycleEnd() {
        clearInterval(intervalId);
        isRunning = false;
        playBeep();
        tomatoSvg.classList.remove('running');
        tomatoSvg.classList.add('finished');
        setTimeout(() => tomatoSvg.classList.remove('finished'), 1300);
        isWork = !isWork;
        const mins = isWork
            ? parseInt(document.getElementById('workMinutes').value, 10) || 25
            : parseInt(document.getElementById('breakMinutes').value, 10) || 5;
        totalSeconds  = mins * 60;
        remainSeconds = totalSeconds;
        updateKawaiiMood();
        buildTickMarks();
        updateDisplay();
        updateNeedle();
        setButtonState(false);
        startTimer();
    }

    function startTimer() {
        isRunning  = true;
        intervalId = setInterval(tick, 1000);
        tomatoSvg.classList.add('running');
        setButtonState(true);
    }

    function setButtonState(running) {
        btnStart.disabled = running;
        btnPause.disabled = !running;
    }

    function pomodoroStart() { if (!isRunning) startTimer(); }

    function pomodoroPause() {
        if (!isRunning) return;
        clearInterval(intervalId);
        isRunning = false;
        tomatoSvg.classList.remove('running');
        setButtonState(false);
    }

    function pomodoroReset() {
        clearInterval(intervalId);
        isRunning = false;
        tomatoSvg.classList.remove('running', 'finished');
        const mins = isWork
            ? parseInt(document.getElementById('workMinutes').value, 10) || 25
            : parseInt(document.getElementById('breakMinutes').value, 10) || 5;
        totalSeconds  = mins * 60;
        remainSeconds = totalSeconds;
        buildTickMarks();
        updateDisplay();
        updateNeedle();
        setButtonState(false);
    }

    function onSettingChange() { if (!isRunning) pomodoroReset(); }
</script>
</body>
</html>
